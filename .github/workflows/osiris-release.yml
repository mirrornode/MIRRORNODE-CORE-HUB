name: Osiris Release Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'osiris/**'
      - 'tests/integration/**'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'canon/charters/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'osiris/**'
      - 'tests/integration/**'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'canon/charters/**'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/osiris
  IMAGE_TAG: ${{ github.sha }}
  COMPOSE_FILES: "docker-compose.yml docker-compose.ci.yml"

jobs:
  verify-charters:
    name: Verify Charters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify OSIRIS charter signature
        run: |
          chmod +x canon/scripts/verify_signature.sh
          f=canon/charters/OSIRIS.md
          sig="${f}.sig"
          if [[ -f "$sig" ]]; then
            ./canon/scripts/verify_signature.sh "$f" "$sig" || { echo "Charter verification failed: $f"; exit 1; }
          else
            echo "Missing signature for $f"; exit 1
          fi

  build-and-push:
    name: Build Push Sign
    runs-on: ubuntu-latest
    needs: verify-charters
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU and Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./osiris
          file: ./osiris/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Install Cosign
        run: |
          COSIGN_VERSION="v2.7.0"
          curl -fsSL -o /tmp/cosign.tar.gz "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-${COSIGN_VERSION}-linux-amd64.tar.gz"
          sudo tar -C /usr/local/bin -xzf /tmp/cosign.tar.gz cosign

      - name: Sign image with Cosign using OIDC
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --oidc-token $ACTIONS_ID_TOKEN --key ${{ secrets.COSIGN_KEY || '' }} ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

      - name: Verify image signature
        run: |
          cosign verify ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI compose override
        run: |
          cat > docker-compose.ci.yml <<EOF
          version: "3.8"
          services:
            osiris:
              image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://localhost:8002/health || exit 1"]
                interval: 5s
                timeout: 3s
                retries: 12
          EOF

      - name: Run docker compose integration
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from tester

      - name: Collect logs
        if: always()
        run: |
          mkdir -p tests/integration/reports
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs osiris > tests/integration/osiris.log || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs tester > tests/integration/tester.log || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osiris-integration-artifacts
          path: |
            tests/integration/osiris.log
            tests/integration/tester.log
            tests/integration/reports/
          retention-days: 7

  promote:
    name: Verify Promote Publish Dossier
    runs-on: ubuntu-latest
    needs: integration-tests
    if: needs.integration-tests.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify cosign signature before promote
        run: |
          cosign verify ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

      - name: Tag and push release image
        env:
          RELEASE_TAG: "release-${{ github.run_number }}"
        run: |
          docker pull ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${RELEASE_TAG}
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${RELEASE_TAG}
          echo "PROMOTED_IMAGE=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${RELEASE_TAG}" >> $GITHUB_OUTPUT

      - name: Create signed dossier entry
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOSSIER="canon/dossiers/osiris-release-${{ github.run_id }}.md"
          echo "## Osiris Release" > "$DOSSIER"
          echo "- run_id: ${{ github.run_id }}" >> "$DOSSIER"
          echo "- commit: ${{ github.sha }}" >> "$DOSSIER"
          echo "- image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}" >> "$DOSSIER"
          echo "- promoted_image: ${{ steps.promote.outputs.PROMOTED_IMAGE || '' }}" >> "$DOSSIER"
          echo "- timestamp: $TIMESTAMP" >> "$DOSSIER"
          echo "" >> "$DOSSIER"
          echo "Artifacts: workflow artifacts attached." >> "$DOSSIER"

          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "${GPG_PRIVATE_KEY}" | base64 --decode > /tmp/gpg.key
            gpg --batch --import /tmp/gpg.key
            echo "${GPG_PASSPHRASE}" > /tmp/gpg.pass
            gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg.pass -o "${DOSSIER}.sig" --sign "$DOSSIER"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$DOSSIER" "${DOSSIER}.sig"
            git commit -m "Add Osiris release dossier for run ${{ github.run_id }}" || echo "No changes to commit"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "GPG_PRIVATE_KEY not provided; dossier created unsigned."
            git add "$DOSSIER"
            git commit -m "Add Osiris release dossier for run ${{ github.run_id }}" || echo "No changes to commit"
            git push origin HEAD:${{ github.ref_name }}
          fi
