# .github/workflows/mirrornode-platform-release.yml
name: MIRRORNODE Platform Release

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'lucian/**'
      - 'osiris/**'
      - 'tests/integration/**'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'canon/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'lucian/**'
      - 'osiris/**'
      - 'tests/integration/**'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - 'canon/**'
      - '.github/workflows/**'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  verify-platform:
    name: Verify Charters & Integrity
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.verify.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run full integrity verification
        run: |
          chmod +x canon/scripts/verify_integrity.sh
          ./canon/scripts/verify_integrity.sh

      - name: Set output
        id: verify
        run: echo "ok=true"

  build-and-test:
    name: Build • Sign • Test (${{ matrix.runtime }})
    needs: verify-platform
    strategy:
      matrix:
        runtime: [lucian, osiris]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set runtime variables
        id: vars
        run: |
          echo "IMAGE_REPO=${{ github.repository_owner }}/${{ matrix.runtime }}" >> $GITHUB_ENV
          echo "HEALTH_PORT=$([[ ${{ matrix.runtime }} == 'lucian' ]] && echo 8001 || echo 8002)" >> $GITHUB_ENV
          echo "HEALTH_PATH=/health" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.runtime }}
          file: ./${{ matrix.runtime }}/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            --fulcio-url=https://fulcio.sigstore.dev \
            --rekor-url=https://rekor.sigstore.dev \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp="^https://github.com/${{ github.repository_owner }}/.github/workflows/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

      - name: Prepare CI compose override
        run: |
          cat > docker-compose.ci.yml <<EOF
          version: "3.8"
          services:
            ${{ matrix.runtime }}:
              image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://localhost:${{ env.HEALTH_PORT }}${{ env.HEALTH_PATH }} || exit 1"]
                interval: 5s
                timeout: 3s
                retries: 12
          EOF

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up \
            --abort-on-container-exit \
            --exit-code-from tester

      - name: Collect logs
        if: always()
        run: |
          mkdir -p tests/integration/reports
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs ${{ matrix.runtime }} > tests/integration/${{ matrix.runtime }}.log || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs tester > tests/integration/tester.log || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.runtime }}-integration-artifacts
          path: tests/integration/
          retention-days: 7

  promote:
    name: Promote Release Images
    needs: build-and-test
    if: needs.build-and-test.result == 'success' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        runtime: [lucian, osiris]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set runtime variables
        id: vars
        run: |
          echo "IMAGE_REPO=${{ github.repository_owner }}/${{ matrix.runtime }}" >> $GITHUB_ENV

      - name: Pull, retag & push release image
        env:
          RELEASE_TAG: "release-${{ github.run_number }}"
        run: |
          docker pull ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${RELEASE_TAG}
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${RELEASE_TAG}

  platform-dossier:
    name: Emit Signed Platform Dossier & Update Index
    needs: promote
    if: needs.promote.result == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & sign unified platform dossier
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOSSIER="canon/dossiers/mirrornode-platform-release-${{ github.run_id }}.md"
          echo "## MIRRORNODE Platform Release" > "$DOSSIER"
          echo "- run_id: ${{ github.run_id }}" >> "$DOSSIER"
          echo "- commit: ${{ github.sha }}" >> "$DOSSIER"
          echo "- lucian_image: ghcr.io/${{ github.repository_owner }}/lucian:${{ env.IMAGE_TAG }}" >> "$DOSSIER"
          echo "- osiris_image: ghcr.io/${{ github.repository_owner }}/osiris:${{ env.IMAGE_TAG }}" >> "$DOSSIER"
          echo "- timestamp: $TIMESTAMP" >> "$DOSSIER"
          echo "- status: success" >> "$DOSSIER"
          echo "" >> "$DOSSIER"
          echo "Both runtimes released in sync. Full audit trail in artifacts." >> "$DOSSIER"

          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "${GPG_PRIVATE_KEY}" | base64 --decode > /tmp/gpg.key
            gpg --batch --import /tmp/gpg.key
            echo "${GPG_PASSPHRASE}" > /tmp/gpg.pass
            gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/gpg.pass -o "${DOSSIER}.sig" --sign "$DOSSIER"
            git add "$DOSSIER" "${DOSSIER}.sig"
          else
            git add "$DOSSIER"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(audit): platform release dossier for run ${{ github.run_id }}" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}

      - name: Update signed releases index
        run: |
          ./canon/scripts/index.sh --update-releases
          ./canon/scripts/verify_integrity.sh
          git add canon/index/releases.json canon/index/releases.json.sig || true
          git commit -m "chore(index): update platform releases index" || true
          git push
